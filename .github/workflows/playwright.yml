name: Playwright Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      test_env:
        description: Environment to run against
        required: true
        default: production
        type: choice
        options:
          - production

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      TEST_ENV: ${{ github.event.inputs.test_env || 'production' }}
      PRODUCTION_BASE_URL: ${{ secrets.PRODUCTION_BASE_URL }}
      WEBSITE_ACCESS_PASSWORD: ${{ secrets.WEBSITE_ACCESS_PASSWORD }}
      PRODUCTION_CUSTOMER_EMAIL: ${{ secrets.PRODUCTION_CUSTOMER_EMAIL }}
      PRODUCTION_CUSTOMER_PASSWORD: ${{ secrets.PRODUCTION_CUSTOMER_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run Playwright tests
        run: npm run test:production

      - name: Generate dashboard
        if: always()
        run: npm run dashboard

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload dashboard
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-dashboard
          path: reports/dashboard/
          retention-days: 14
